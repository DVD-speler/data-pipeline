name: Crypto Signal (hourly)

# Getriggerd via cron-job.org (workflow_dispatch) elk uur op :05 UTC.
# GitHub's eigen scheduler is uitgeschakeld — die heeft tot 60 min vertraging.
# Handmatig triggeren via de Actions-tab op GitHub is ook mogelijk.
on:
  workflow_dispatch:
  push:
    paths:
      - 'crypto/**'
      - 'shared/**'
      - '.github/workflows/crypto_*.yml'
      - '!crypto/data/**'

defaults:
  run:
    working-directory: crypto

env:
  PYTHONPATH: ${{ github.workspace }}

# Alle 3 crypto signal-workflows delen één concurrency-group zodat ze in
# serie commit + pushen i.p.v. parallel — voorkomt rebase-races wanneer
# meerdere workflows tegelijk getriggerd worden (push-event raakt alle 3).
concurrency:
  group: crypto-signal-commit
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nodig om paper_trades.json terug te committen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Installeer dependencies
        working-directory: .
        run: pip install -r requirements.txt

      # Cache de SQLite database tussen runs (wekelijkse rotatie).
      # Bij cache miss: volledige download van 35 dagen (720h minimum voor return_30d).
      # Bij cache hit: alleen de laatste paar uur worden incrementeel toegevoegd.
      - name: Herstel OHLCV database uit cache
        uses: actions/cache@v4
        with:
          path: crypto/data/ohlcv.db
          key: ohlcv-weekly-${{ github.run_id }}
          restore-keys: |
            ohlcv-weekly-

      - name: Download OHLCV (incrementeel of 35 dagen bij lege cache)
        run: |
          python - <<'EOF'
          import pathlib
          from src.data_fetcher import download_ohlcv
          days = 2 if pathlib.Path("data/ohlcv.db").exists() else 35
          print(f"OHLCV download: {days} dagen")
          download_ohlcv(days=days)
          EOF

      - name: Update externe data (Fear & Greed, SPX, EURUSD, funding)
        run: python main.py --phase external_data

      - name: Genereer BTC signaal en update paper trades
        run: python main.py --phase live_alert --symbol BTCUSDT
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      # Commit de bijgewerkte bestanden terug naar de repo.
      # git diff --cached --quiet voorkomt een lege commit als er niets veranderd is.
      - name: Commit gewijzigde bestanden
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto/data/external/ \
                  crypto/data/BTCUSDT_paper_trades.json \
                  crypto/data/BTCUSDT_latest_signal.json
          git diff --cached --quiet || git commit -m "C: signal: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin master
          git push

name: Crypto Honest Check (Check 2 — holdout AUC)

# Handmatig te triggeren (Actions-tab -> Run workflow). Bouwt de 1h
# feature-matrix en draait scripts/honest_holdout.py: gepoolde out-of-sample
# AUC met default params (geen tuning-leak) en pure forward-predictie.
# Zie docs/crypto/HARNESS_FIX_PLAN.md, Fase 0 / Check 2.
on:
  workflow_dispatch:
    inputs:
      months:
        description: "Aantal OOS-folds (~maanden)"
        default: "18"
      fold_days:
        description: "Dagen per fold"
        default: "30"

defaults:
  run:
    working-directory: crypto

env:
  PYTHONPATH: ${{ github.workspace }}

concurrency:
  group: crypto-honest-check
  cancel-in-progress: false

jobs:
  honest-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nodig om het rapport terug te committen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Installeer dependencies
        working-directory: .
        run: pip install -r requirements.txt

      - name: Herstel OHLCV database uit cache
        uses: actions/cache@v4
        with:
          path: crypto/data/ohlcv.db
          key: ohlcv-honest-${{ github.run_id }}
          restore-keys: |
            ohlcv-weekly-

      - name: Download 1h OHLCV (1100 dagen, BTC + ETH)
        run: |
          python - <<'EOF'
          from src.data_fetcher import download_ohlcv
          print("OHLCV 1h download: 1100 dagen")
          download_ohlcv(days=1100, intervals=["1h"])
          EOF

      - name: Update externe data (macro/funding/F&G)
        run: python main.py --phase external_data

      - name: P1/P2 labels
        run: python main.py --phase p1p2 --symbol BTCUSDT

      - name: Bouw feature-matrix
        run: python main.py --phase features --symbol BTCUSDT

      - name: Honest holdout (Check 2)
        run: |
          python scripts/honest_holdout.py \
            --months "${{ github.event.inputs.months }}" \
            --fold-days "${{ github.event.inputs.fold_days }}" \
            --symbol BTCUSDT

      - name: Commit rapport
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto/data/stats/honest_holdout.md
          git diff --cached --quiet || git commit -m "C: honest-check: holdout AUC $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin master
          git push

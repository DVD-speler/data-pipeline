name: Crypto Signal (4h)

# Getriggerd via cron-job.org (workflow_dispatch) elke 4 uur op :05 UTC.
# Geëxtraheerd uit de unified signal.yml in de monorepo-migratie.
on:
  workflow_dispatch:
  push:
    paths:
      - 'crypto/**'
      - 'shared/**'
      - '.github/workflows/crypto_*.yml'
      - '!crypto/data/**'

defaults:
  run:
    working-directory: crypto

env:
  PYTHONPATH: ${{ github.workspace }}

# Gedeelde concurrency-group met de andere crypto signal-workflows
# (zie crypto_signal_hourly.yml comment).
concurrency:
  group: crypto-signal-commit
  cancel-in-progress: false

jobs:
  signal-4h:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Installeer dependencies
        working-directory: .
        run: pip install -r requirements.txt

      # Gedeelde cache met andere crypto-workflows — zelfde ohlcv.db bevat alle intervals.
      - name: Herstel OHLCV database uit cache
        uses: actions/cache@v4
        with:
          path: crypto/data/ohlcv.db
          key: ohlcv-weekly-${{ github.run_id }}
          restore-keys: |
            ohlcv-weekly-

      - name: Download OHLCV 4h (incrementeel of 35 dagen bij lege cache)
        run: |
          python - <<'EOF'
          import pathlib
          from src.data_fetcher import download_ohlcv
          days = 2 if pathlib.Path("data/ohlcv.db").exists() else 35
          print(f"OHLCV 4h download: {days} dagen")
          download_ohlcv(days=days, intervals=["4h"])
          EOF

      - name: Update externe data (Fear & Greed, SPX, EURUSD, funding)
        run: python main.py --phase external_data

      - name: Genereer BTC 4h signaal
        run: python main.py --phase live_alert_4h --symbol BTCUSDT
        env:
          DISCORD_WEBHOOK_URL_4H: ${{ secrets.DISCORD_WEBHOOK_URL_4H }}

      - name: Commit gewijzigde bestanden
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto/data/external/ \
                  crypto/data/BTCUSDT_4h_paper_trades.json \
                  crypto/data/BTCUSDT_4h_latest_signal.json
          git diff --cached --quiet || git commit -m "C: 4h-signal: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin master
          git push
